name: Build Docker Image

on:
  push:
    tags:
      - "*"
jobs:
  build_docker_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      packages: write
      contents: read
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Log in to Docker Hub
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GHCR metadata
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=beta,enable=${{ contains(github.ref, '-beta') }}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push GHCR image
        id: build_ghcr
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Extract Docker Hub metadata
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        id: meta_dockerhub
        uses: docker/metadata-action@v5
        with:
          images: |
            tbphp/gpt-load
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=beta,enable=${{ contains(github.ref, '-beta') }}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push Docker Hub image
        if: ${{ env.HAS_DOCKERHUB == 'true' }}
        id: build_dockerhub
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
